<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathStep</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">
<header class="bg-white border-b border-slate-200 sticky top-0 z-10">
<div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
<div>
<h1 class="text-2xl font-bold">MathStep</h1>
<p class="text-sm text-slate-500">Самообучение математике</p>
</div>
<nav class="flex gap-6 text-sm font-medium">
<a href="#modules" class="hover:text-blue-600">Модули</a>
<a href="#theory" class="hover:text-blue-600">Теория</a>
<a href="#practice" class="hover:text-blue-600">Практика</a>
</nav>
</div>
</header>
<main>
<section class="max-w-7xl mx-auto px-6 py-16">
<h2 class="text-5xl font-bold mb-6">Изучайте математику интерактивно</h2>
<p class="text-lg text-slate-600 mb-8">Теория, тесты и автоматическая проверка ответов.</p>
</section>
<section id="practice" class="max-w-5xl mx-auto px-6 py-16">
<div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-8">
<h3 class="text-xl font-semibold mb-6">Чему равен sin(90°)?</h3>
<div class="space-y-3">
<button onclick="checkAnswer(this,false)" class="answer-btn w-full text-left px-5 py-4 rounded-2xl border border-slate-200">0</button>
<button onclick="checkAnswer(this,true)" class="answer-btn w-full text-left px-5 py-4 rounded-2xl border border-slate-200">1</button>
<button onclick="checkAnswer(this,false)" class="answer-btn w-full text-left px-5 py-4 rounded-2xl border border-slate-200">-1</button>
</div>
</div>
</section>
</main>
<script>
function checkAnswer(button, isCorrect) {
const parent = button.parentElement;
const buttons = parent.querySelectorAll('.answer-btn');
buttons.forEach(btn => btn.disabled = true);
if (isCorrect) {
button.classList.add('bg-green-100');
} else {
button.classList.add('bg-red-100');
}
}
</script>
</body>
</html>
